<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>MoviePulse - Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dark">
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <img src="assets/logo.png" alt="MoviePulse" class="loading-logo">
            <h1 class="loading-title">MOVIEPULSE</h1>
            <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <nav class="top-nav">
        <div class="nav-left"><img src="assets/logo.png" class="nav-logo" onclick="location.href='index.html'"></div>
        <div class="nav-right">
            <button class="nav-icon-btn" onclick="location.href='search.html'">🔍</button>
            <button class="nav-icon-btn" id="settingsBtn">⚙️</button>
            <div class="profile-avatar" id="profileAvatar"><span id="avatarLetter">U</span></div>
            <div id="profileDropdown" class="profile-dropdown hidden">
                <a href="account.html">My Account</a><a href="subscription.html">Subscription</a><hr><a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="search-header">
            <div class="search-input-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search movies, series..." class="search-input">
                <button id="voiceSearchBtn" class="voice-search-btn">🎤</button>
                <button id="clearSearchBtn" class="clear-search-btn hidden">✕</button>
            </div>
        </div>

        <div class="recent-searches" id="recentSearches">
            <div class="section-header">
                <h3>Recent Searches</h3>
                <button id="clearRecentBtn" class="clear-btn">Clear All</button>
            </div>
            <div class="recent-chips" id="recentChips"></div>
        </div>

        <div class="filter-section">
            <div class="category-filters" id="categoryFilters">
                <button data-category="all" class="filter-chip active">All</button>
            </div>
            <div class="extra-filters">
                <select id="typeFilter">
                    <option value="all">All Types</option>
                    <option value="free">Free Only</option>
                    <option value="premium">Premium Only</option>
                </select>
                <select id="sortFilter">
                    <option value="relevance">Relevance</option>
                    <option value="newest">Newest</option>
                    <option value="popular">Most Popular</option>
                </select>
            </div>
        </div>

        <div class="results-header">
            <h3 id="resultsTitle">Search Results</h3>
            <span id="resultsCount"></span>
        </div>

        <div class="results-grid" id="resultsGrid">
            <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
        </div>

        <div id="noResults" class="no-results hidden">
            <div class="no-results-icon">🎬</div>
            <h3>No results found</h3>
            <p>Try searching for something else</p>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="location.href='index.html'"><span class="nav-icon">🏠</span><span class="nav-label">Home</span><span class="nav-dot"></span></button>
        <button class="nav-item active" onclick="location.href='search.html'"><span class="nav-icon">🔍</span><span class="nav-label">Search</span><span class="nav-dot"></span></button>
        <button class="nav-item" onclick="location.href='series.html'"><span class="nav-icon">📺</span><span class="nav-label">Series</span><span class="nav-dot"></span></button>
        <button class="nav-item" onclick="location.href='downloads.html'"><span class="nav-icon">⬇️</span><span class="nav-label">Downloads</span><span class="nav-dot"></span></button>
        <button class="nav-item" onclick="location.href='account.html'"><span class="nav-icon">👤</span><span class="nav-label">Account</span><span class="nav-dot"></span></button>
    </nav>

    <div id="toast" class="toast hidden"></div>
    <div id="settingsModal" class="modal hidden"><div class="modal-content glass"><div class="modal-header"><h2>Settings</h2><button class="close-modal">&times;</button></div><div class="modal-body"><div class="settings-section"><h3>Appearance</h3><label><input type="radio" name="theme" value="dark"> Dark Mode</label><label><input type="radio" name="theme" value="light"> Light Mode</label></div><div id="adminSection" style="display:none"><h3>Admin</h3><button id="forceSyncBtn">Force Sync</button></div></div></div></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
