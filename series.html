<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/png" href="./assets/logo.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Series — MoviePulse</title>
  </head>
  <body>
    <header class="topnav">
      <a href="./index.html" class="topnav-logo">
        <img src="./assets/logo.png" alt="MoviePulse" /><span>MoviePulse</span>
      </a>
      <div class="topnav-actions">
        <a href="./search.html" class="icon-btn"><i class="fa-solid fa-magnifying-glass"></i></a>
        <button id="profileBtn" class="icon-btn"><i class="fa-solid fa-user"></i></button>
        <div id="profileMenu" class="dropdown-menu">
          <a href="./account.html"><i class="fa-solid fa-user-circle"></i> My Account</a>
          <a href="./subscription.html"><i class="fa-solid fa-crown"></i> Subscription</a>
          <button id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </div>
      </div>
    </header>

    <main class="page">
      <h1 class="page-title">Series</h1>

      <!-- If a single series is selected via ?id=, show its detail view -->
      <div id="seriesDetail" class="movie-detail" hidden></div>

      <!-- Otherwise list all series -->
      <section id="seriesGridSection" class="section">
        <div class="grid" id="seriesGrid">
          <div class="skeleton-card"></div><div class="skeleton-card"></div>
          <div class="skeleton-card"></div><div class="skeleton-card"></div>
        </div>
      </section>
    </main>

    <nav class="bottomnav" data-page="series">
      <a href="./index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
      <a href="./search.html"><i class="fa-solid fa-magnifying-glass"></i><span>Search</span></a>
      <a href="./series.html"><i class="fa-solid fa-clapperboard"></i><span>Series</span></a>
      <a href="./downloads.html"><i class="fa-solid fa-download"></i><span>Downloads</span></a>
      <a href="./account.html"><i class="fa-solid fa-user"></i><span>Account</span></a>
    </nav>

    <div id="toast" class="toast" hidden></div>

    <script type="module" src="./js/firebase.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
