<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoviePulse</title>

<link rel="stylesheet" href="css/styles.css">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins&display=swap" rel="stylesheet">

<script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script defer src="js/firebase.js"></script>
<script defer src="js/app.js"></script>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<img src="assets/logo.png">
<h1 id="logoText">MoviePulse</h1>
<div class="dots"><span></span><span></span><span></span></div>
</div>

<!-- WELCOME POPUP -->
<div id="welcomePopup" class="modal hidden">
<div class="modal-content">
<h2>Welcome to MoviePulse</h2>
<p>Join our community for updates!</p>
<a href="https://whatsapp.com/channel/0029Vb73dtF5kg76mEEo1L3a" target="_blank">
<button class="green">Join WhatsApp</button>
</a>
<p onclick="closeWelcome()">Maybe later</p>
</div>
</div>

<!-- NOTIFICATION POPUP -->
<div id="notifPopup" class="modal hidden">
<div class="modal-content">
<h2>Stay Updated!</h2>
<button onclick="enableNotif()">Enable Notifications</button>
<p onclick="closeNotif()">Later</p>
</div>
</div>

<header class="top">
<img src="assets/logo.png" onclick="goHome()">
<div>
<button onclick="goSearch()">🔍</button>
<button onclick="goAccount()">👤</button>
</div>
</header>

<!-- HERO -->
<div id="hero" class="hero"></div>

<!-- BANNER AD -->
<a id="bannerAd" target="_blank">
<img id="bannerImg">
</a>

<h2>Trending</h2>
<div id="trending" class="row"></div>

<nav class="bottom-nav">
<button onclick="goHome()">🏠</button>
<button onclick="goSearch()">🔍</button>
<button onclick="goSeries()">📺</button>
<button onclick="goDownloads()">⬇</button>
<button onclick="goAccount()">👤</button>
</nav>

<div id="toast"></div>

</body>
</html>
