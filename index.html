<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="description" content="MoviePulse - Premium Streaming Platform">
    <link rel="manifest" href="manifest.json">
    <title>MoviePulse - Stream Movies & Series</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- ATTRACTIVE TEXT-ONLY LOADING SCREEN -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="cinema-lines">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </div>
            <div class="loading-title">
                <span class="letter">M</span>
                <span class="letter">O</span>
                <span class="letter">V</span>
                <span class="letter">I</span>
                <span class="letter">E</span>
                <span class="letter">P</span>
                <span class="letter">U</span>
                <span class="letter">L</span>
                <span class="letter">S</span>
                <span class="letter">E</span>
            </div>
            <div class="tagline">Stream the Extraordinary</div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="loading-status">Loading experience...</div>
            <div class="film-reel">
                <div class="reel"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" style="display: none;">
        <!-- Top Navigation -->
        <nav class="top-nav">
            <div class="logo" onclick="window.location.href='index.html'">
                <div class="logo-icon">🎬</div>
                <span>MOVIEPULSE</span>
            </div>
            <div class="top-nav-actions">
                <button class="icon-btn" onclick="window.location.href='search.html'">🔍</button>
                <button class="icon-btn" id="settings-gear">⚙️</button>
                <button class="icon-btn" id="profile-btn">👤</button>
            </div>
        </nav>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal">
            <div class="modal-content glass">
                <div class="modal-header">
                    <h2>⚙️ Settings</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="settings-section">
                        <h3>🎨 Appearance</h3>
                        <div class="setting-item">
                            <label>Theme Mode</label>
                            <select id="theme-select">
                                <option value="dark">🌙 Dark</option>
                                <option value="light">☀️ Light</option>
                                <option value="auto">🔄 Auto (System)</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>Card Layout</label>
                            <select id="card-size">
                                <option value="normal">📱 Normal</option>
                                <option value="compact">📦 Compact</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="settings-section">
                        <h3>▶️ Playback</h3>
                        <div class="setting-item">
                            <label>Autoplay Next</label>
                            <input type="checkbox" id="autoplay-next">
                        </div>
                        <div class="setting-item">
                            <label>Video Quality</label>
                            <select id="video-quality">
                                <option value="auto">Auto</option>
                                <option value="720">720p HD</option>
                                <option value="1080">1080p Full HD</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>Skip Seconds (double-tap)</label>
                            <select id="skip-seconds">
                                <option value="5">5 sec</option>
                                <option value="10" selected>10 sec</option>
                                <option value="15">15 sec</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="settings-section">
                        <h3>⬇️ Downloads</h3>
                        <div class="setting-item">
                            <label>Wi-Fi Only</label>
                            <input type="checkbox" id="wifi-only-download">
                        </div>
                        <div class="setting-item">
                            <label>Max Storage</label>
                            <select id="storage-limit">
                                <option value="2">2 GB</option>
                                <option value="5" selected>5 GB</option>
                                <option value="unlimited">Unlimited</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="settings-section">
                        <h3>🔒 Privacy</h3>
                        <button id="clear-history-btn" class="danger-btn">🗑️ Clear Watch History</button>
                        <button id="logout-all-devices" class="danger-btn">🚪 Log Out All Devices</button>
                    </div>
                    
                    <div class="settings-section">
                        <h3>ℹ️ About</h3>
                        <p>📱 Version: <strong>v1.0.0</strong></p>
                        <p>💬 <a href="#" id="whatsapp-link" style="color: #25D366;">WhatsApp Channel</a></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active" data-page="home">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
                <span class="nav-dot"></span>
            </a>
            <a href="search.html" class="nav-item" data-page="search">
                <span class="nav-icon">🔍</span>
                <span class="nav-label">Search</span>
                <span class="nav-dot"></span>
            </a>
            <a href="series.html" class="nav-item" data-page="series">
                <span class="nav-icon">📺</span>
                <span class="nav-label">Series</span>
                <span class="nav-dot"></span>
            </a>
            <a href="downloads.html" class="nav-item" data-page="downloads">
                <span class="nav-icon">⬇️</span>
                <span class="nav-label">Downloads</span>
                <span class="nav-dot"></span>
            </a>
            <a href="account.html" class="nav-item" data-page="account">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Account</span>
                <span class="nav-dot"></span>
            </a>
        </nav>

        <!-- Main Content -->
        <main class="main-container">
            <!-- Hero Slider -->
            <section class="hero-section" id="hero-section">
                <div class="hero-placeholder">
                    <div class="hero-loading"></div>
                </div>
            </section>

            <!-- Dynamic Sections -->
            <div id="sections-container">
                <div class="skeleton-sections">
                    <div class="skeleton-section"></div>
                    <div class="skeleton-section"></div>
                    <div class="skeleton-section"></div>
                </div>
            </div>
        </main>

        <!-- Toast -->
        <div id="toast" class="toast"></div>
    </div>

    <!-- Firebase Modules -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
