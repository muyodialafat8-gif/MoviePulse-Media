<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="description" content="MoviePulse - Stream movies and series instantly">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <title>MoviePulse - Stream Movies & Series</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dark">
    <!-- LOADING SCREEN -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <img src="assets/logo.png" alt="MoviePulse" class="loading-logo">
            <h1 class="loading-title">MOVIEPULSE</h1>
            <div class="loading-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <!-- TOP NAVIGATION -->
    <nav class="top-nav">
        <div class="nav-left">
            <img src="assets/logo.png" alt="MoviePulse" class="nav-logo" onclick="location.href='index.html'">
        </div>
        <div class="nav-right">
            <button class="nav-icon-btn" onclick="location.href='search.html'">🔍</button>
            <button class="nav-icon-btn" id="settingsBtn">⚙️</button>
            <div class="profile-avatar" id="profileAvatar" onclick="toggleProfileDropdown()">
                <span id="avatarLetter">U</span>
            </div>
            <div id="profileDropdown" class="profile-dropdown hidden">
                <a href="account.html">My Account</a>
                <a href="subscription.html">Subscription</a>
                <hr>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <!-- TOP BANNER AD -->
        <div id="topBannerAd" class="top-banner-ad hidden">
            <a href="#" id="adLink" target="_blank">
                <img src="" alt="Advertisement" id="adImage">
            </a>
            <button class="close-ad" id="closeAdBtn">✕</button>
        </div>

        <!-- HERO SLIDER -->
        <section class="hero-slider" id="heroSlider">
            <div class="hero-track" id="heroTrack"></div>
            <div class="hero-dots" id="heroDots"></div>
        </section>

        <!-- DYNAMIC SECTIONS CONTAINER -->
        <div id="sectionsContainer"></div>
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-page="index">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
            <span class="nav-dot"></span>
        </button>
        <button class="nav-item" data-page="search" onclick="location.href='search.html'">
            <span class="nav-icon">🔍</span>
            <span class="nav-label">Search</span>
            <span class="nav-dot"></span>
        </button>
        <button class="nav-item" data-page="series" onclick="location.href='series.html'">
            <span class="nav-icon">📺</span>
            <span class="nav-label">Series</span>
            <span class="nav-dot"></span>
        </button>
        <button class="nav-item" data-page="downloads" onclick="location.href='downloads.html'">
            <span class="nav-icon">⬇️</span>
            <span class="nav-label">Downloads</span>
            <span class="nav-dot"></span>
        </button>
        <button class="nav-item" data-page="account" onclick="location.href='account.html'">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Account</span>
            <span class="nav-dot"></span>
        </button>
    </nav>

    <!-- VIDEO PLAYER OVERLAY -->
    <div id="videoPlayerOverlay" class="video-overlay hidden">
        <div class="video-container">
            <button class="close-video" id="closeVideoBtn">✕</button>
            <div id="adContainer" class="ad-container hidden">
                <video id="adVideo" class="ad-video"></video>
                <button id="skipAdBtn" class="skip-ad-btn hidden">Skip Ad <span id="skipTimer">5</span></button>
            </div>
            <div id="mainVideoContainer" class="main-video-container hidden">
                <video id="mainVideo" class="main-video"></video>
                <div class="video-controls" id="videoControls">
                    <button id="playPauseBtn">▶</button>
                    <span id="currentTime">0:00</span>
                    <input type="range" id="progressBar" value="0" step="0.01">
                    <span id="duration">0:00</span>
                    <button id="volumeBtn">🔊</button>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
                    <button id="fullscreenBtn">⛶</button>
                </div>
            </div>
            <div id="premiumLockOverlay" class="premium-lock-overlay hidden">
                <div class="lock-content">
                    <span class="lock-icon">🔒</span>
                    <h3>Premium Content</h3>
                    <p>Subscribe to watch this movie</p>
                    <button onclick="location.href='subscription.html'" class="subscribe-btn">Subscribe Now</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="settingsModal" class="modal hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <h3>Appearance</h3>
                    <label><input type="radio" name="theme" value="dark"> Dark Mode</label>
                    <label><input type="radio" name="theme" value="light"> Light Mode</label>
                    <label><input type="radio" name="theme" value="auto"> Auto (Follow System)</label>
                </div>
                <div class="settings-section" id="adminSection" style="display:none">
                    <h3>Admin Settings</h3>
                    <label><input type="checkbox" id="debugMode"> Firestore Debugging Mode</label>
                    <button id="forceSyncBtn">Force Sync Data</button>
                    <button id="clearStorageBtn">Clear All Local Storage</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="toast hidden"></div>

    <!-- RATE US MODAL -->
    <div id="rateModal" class="modal hidden">
        <div class="modal-content glass">
            <h3>Enjoying MoviePulse?</h3>
            <p>Rate us 5 stars!</p>
            <div class="star-rating">
                <span data-value="1">☆</span><span data-value="2">☆</span><span data-value="3">☆</span><span data-value="4">☆</span><span data-value="5">☆</span>
            </div>
            <button id="submitRatingBtn">Submit</button>
        </div>
    </div>

    <!-- PWA INSTALL BANNER -->
    <div id="installBanner" class="install-banner hidden">
        <img src="assets/logo.png" alt="MoviePulse" width="32">
        <div class="install-text">
            <strong>Install MoviePulse App</strong>
            <small>Watch offline, faster loading!</small>
        </div>
        <button id="installBtn">Install Now</button>
        <button id="dismissInstallBtn">✕</button>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
