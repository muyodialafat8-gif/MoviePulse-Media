<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>MoviePulse - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dark">
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <img src="assets/logo.png" alt="MoviePulse" class="loading-logo">
            <h1 class="loading-title">MOVIEPULSE</h1>
            <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card glass">
            <div class="auth-logo">
                <img src="assets/logo.png" alt="MoviePulse">
                <h2>MoviePulse</h2>
            </div>
            <h1>Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue watching</p>

            <button id="googleLoginBtn" class="google-btn">
                <span class="google-icon">G</span> Continue with Google
            </button>

            <div class="divider">OR</div>

            <form id="loginForm">
                <div class="input-group">
                    <span class="input-icon">📧</span>
                    <input type="email" id="loginEmail" placeholder="Email address" required>
                </div>
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="button" class="toggle-password" data-target="loginPassword">👁️</button>
                </div>
                <button type="submit" id="signInBtn" class="btn-primary full-width">Sign In</button>
            </form>

            <div class="auth-links">
                <a href="#" id="forgotPasswordLink">Forgot Password?</a>
                <a href="register.html">Don't have an account? Sign Up</a>
            </div>

            <div class="divider"></div>
            <div class="community-section">
                <p>Join our community</p>
                <button id="whatsappCommunityBtn" class="whatsapp-btn">
                    💬 Join WhatsApp Channel
                </button>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal hidden">
        <div class="modal-content glass">
            <h3>Reset Password</h3>
            <p>Enter your email to receive a password reset link</p>
            <input type="email" id="resetEmail" placeholder="Email address" class="full-width">
            <div class="modal-buttons">
                <button id="sendResetBtn" class="btn-primary">Send Reset Link</button>
                <button class="close-modal">Cancel</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
