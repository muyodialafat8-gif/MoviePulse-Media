<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/png" href="./assets/logo.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Sign In — MoviePulse</title>
  </head>
  <body class="auth-body">
    <a href="./index.html" class="auth-logo">
      <img src="./assets/logo.png" alt="MoviePulse" />
    </a>

    <main class="auth-wrap">
      <div class="auth-card glass">
        <h1>Welcome Back</h1>
        <p class="muted">Sign in to continue watching</p>

        <button id="googleBtn" class="btn btn-google">
          <i class="fa-brands fa-google"></i> Continue with Google
        </button>

        <div class="divider"><span>OR</span></div>

        <form id="loginForm" class="auth-form">
          <label class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="Email Address" required autocomplete="email" />
          </label>
          <label class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password" />
            <button type="button" class="eye" id="loginEye"><i class="fa-solid fa-eye"></i></button>
          </label>
          <button type="submit" class="btn btn-primary btn-block">Sign In</button>
          <button type="button" id="forgotBtn" class="link center">Forgot Password?</button>
        </form>

        <p class="center auth-foot">
          Don't have an account? <a href="./register.html" class="accent">Sign Up</a>
        </p>

        <div class="divider"></div>

        <p class="center muted small">Join our community</p>
        <a href="https://whatsapp.com/channel/0029Vb73dtF5kg76mEEo1L3a" target="_blank" rel="noopener" class="btn btn-whatsapp btn-block">
          <i class="fa-brands fa-whatsapp"></i> WhatsApp Channel
        </a>
      </div>
    </main>

    <div id="toast" class="toast" hidden></div>

    <script type="module" src="./js/firebase.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
