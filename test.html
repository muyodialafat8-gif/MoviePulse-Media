<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoviePulse - Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
        }

        /* LOADING SCREEN */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a, #1a0a0a);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .loading-content {
            text-align: center;
        }

        .loading-title {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #fff, #e50914);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            font-family: 'Arial Black', sans-serif;
        }

        .tagline {
            color: rgba(255,255,255,0.6);
            letter-spacing: 3px;
            font-size: 12px;
            margin-bottom: 30px;
        }

        .progress-bar {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            margin: 20px auto;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #e50914;
            animation: fillProgress 2.5s linear forwards;
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .loading-status {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }

        .reel {
            width: 30px;
            height: 30px;
            border: 3px solid #e50914;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin: 20px auto 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* MAIN CONTENT */
        #main-content {
            display: none;
            padding: 20px;
        }

        h1 {
            color: white;
            font-family: 'Arial Black', sans-serif;
        }

        p {
            color: #aaa;
            margin-top: 10px;
        }

        button {
            background: #e50914;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- LOADING SCREEN -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-title">MOVIEPULSE</div>
            <div class="tagline">Stream the Extraordinary</div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="loading-status">Loading experience...</div>
            <div class="reel"></div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main-content">
        <h1>🎬 Welcome to MoviePulse!</h1>
        <p>Loading screen worked successfully.</p>
        <p>You can now continue building the full app.</p>
        <button onclick="alert('Ready for Part 2!')">Continue →</button>
    </div>

    <script>
        // SIMPLE AND RELIABLE - Hide loading screen after 3 seconds
        console.log("Script started");
        
        setTimeout(function() {
            console.log("Hiding loading screen now");
            var loadingScreen = document.getElementById('loading-screen');
            var mainContent = document.getElementById('main-content');
            
            if (loadingScreen) {
                loadingScreen.style.opacity = '0';
                setTimeout(function() {
                    loadingScreen.style.display = 'none';
                    if (mainContent) {
                        mainContent.style.display = 'block';
                        console.log("Main content visible");
                    }
                }, 500);
            } else {
                console.log("Loading screen not found");
            }
        }, 3000);
        
        // Also add a fallback - if something goes wrong, force hide after 5 seconds
        setTimeout(function() {
            var loadingScreen = document.getElementById('loading-screen');
            var mainContent = document.getElementById('main-content');
            if (loadingScreen && loadingScreen.style.display !== 'none') {
                console.log("Fallback triggered");
                loadingScreen.style.display = 'none';
                if (mainContent) mainContent.style.display = 'block';
            }
        }, 5000);
    </script>
</body>
</html>
