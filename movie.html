<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>MoviePulse - Watch Movie</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dark">
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <img src="assets/logo.png" alt="MoviePulse" class="loading-logo">
            <h1 class="loading-title">MOVIEPULSE</h1>
            <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <nav class="top-nav">
        <div class="nav-left"><img src="assets/logo.png" class="nav-logo" onclick="location.href='index.html'"></div>
        <div class="nav-right">
            <button class="nav-icon-btn" onclick="location.href='search.html'">🔍</button>
            <button class="nav-icon-btn" id="settingsBtn">⚙️</button>
            <div class="profile-avatar" id="profileAvatar"><span id="avatarLetter">U</span></div>
            <div id="profileDropdown" class="profile-dropdown hidden">
                <a href="account.html">My Account</a><a href="subscription.html">Subscription</a><hr><a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>
    </nav>

    <main class="main-content" id="movieContent">
        <div class="movie-hero" id="movieHero">
            <div class="hero-backdrop" id="heroBackdrop"></div>
            <div class="hero-overlay"></div>
            <div class="hero-info">
                <h1 id="movieTitle">Loading...</h1>
                <div class="movie-meta">
                    <span class="category-badge" id="movieCategory"></span>
                    <span class="vj-name" id="vjName"></span>
                    <span class="views-count" id="viewsCount"></span>
                    <span class="premium-badge hidden" id="premiumBadge">PREMIUM</span>
                </div>
                <p id="movieDescription"></p>
                <div class="rating-display">
                    <span class="average-score" id="avgScore">0.0</span>
                    <div class="stars-display" id="starsDisplay"></div>
                    <span id="totalRatings">(0 ratings)</span>
                </div>
                <div class="action-buttons">
                    <button id="watchNowBtn" class="btn-primary">▶ Watch Now</button>
                    <button id="favoriteBtn" class="btn-icon">❤️ <span id="favCount">0</span></button>
                    <button id="downloadBtn" class="btn-icon">⬇️ Download</button>
                    <button id="shareBtn" class="btn-icon">📤 Share</button>
                    <button id="reportBtn" class="btn-icon">🚩 Report</button>
                    <button id="trailerBtn" class="btn-icon hidden">🎬 Trailer</button>
                </div>
            </div>
        </div>

        <div class="rating-distribution" id="ratingDistribution">
            <h3>Ratings Breakdown</h3>
            <div id="distBars"></div>
            <div class="user-rating">
                <h4>Rate this movie</h4>
                <div class="user-stars" id="userStars">
                    <span data-value="1">☆</span><span data-value="2">☆</span><span data-value="3">☆</span><span data-value="4">☆</span><span data-value="5">☆</span>
                </div>
                <button id="submitRatingBtn" class="btn-small">Submit Rating</button>
            </div>
        </div>

        <div class="related-section">
            <h3>More Like This</h3>
            <div class="related-carousel" id="relatedMovies"></div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="location.href='index.html'"><span class="nav-icon">🏠</span><span class="nav-label">Home</span><span class="nav-dot"></span></button>
        <button class="nav-item" onclick="location.href='search.html'"><span class="nav-icon">🔍</span><span class="nav-label">Search</span><span class="nav-dot"></span></button>
        <button class="nav-item" onclick="location.href='series.html'"><span class="nav-icon">📺</span><span class="nav-label">Series</span><span class="nav-dot"></span></button>
        <button class="nav-item" onclick="location.href='downloads.html'"><span class="nav-icon">⬇️</span><span class="nav-label">Downloads</span><span class="nav-dot"></span></button>
        <button class="nav-item" onclick="location.href='account.html'"><span class="nav-icon">👤</span><span class="nav-label">Account</span><span class="nav-dot"></span></button>
    </nav>

    <div id="videoPlayerOverlay" class="video-overlay hidden">
        <div class="video-container">
            <button class="close-video" id="closeVideoBtn">✕</button>
            <div id="adContainer" class="ad-container hidden"><video id="adVideo" class="ad-video"></video><button id="skipAdBtn" class="skip-ad-btn hidden">Skip Ad <span id="skipTimer">5</span></button></div>
            <div id="mainVideoContainer" class="main-video-container hidden"><video id="mainVideo" class="main-video"></video><div class="video-controls" id="videoControls"><button id="playPauseBtn">▶</button><span id="currentTime">0:00</span><input type="range" id="progressBar" value="0"><span id="duration">0:00</span><button id="volumeBtn">🔊</button><input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1"><button id="fullscreenBtn">⛶</button></div></div>
            <div id="premiumLockOverlay" class="premium-lock-overlay hidden"><div class="lock-content"><span class="lock-icon">🔒</span><h3>Premium Content</h3><p>Subscribe to watch this movie</p><button onclick="location.href='subscription.html'" class="subscribe-btn">Subscribe Now</button></div></div>
        </div>
    </div>

    <div id="shareBottomSheet" class="bottom-sheet hidden">
        <div class="sheet-content">
            <div class="sheet-header"><img id="sharePoster" width="40"><span id="shareTitle"></span><button class="close-sheet">✕</button></div>
            <div class="share-grid"><button data-platform="whatsapp" class="share-btn">📱 WhatsApp</button><button data-platform="facebook" class="share-btn">📘 Facebook</button><button data-platform="twitter" class="share-btn">🐦 Twitter</button><button data-platform="telegram" class="share-btn">📨 Telegram</button><button data-platform="copy" class="share-btn">🔗 Copy Link</button><button data-platform="more" class="share-btn">⋯ More</button></div>
        </div>
    </div>

    <div id="reportModal" class="modal hidden"><div class="modal-content glass"><h3>Report an Issue</h3><div id="reportOptions"><label><input type="radio" name="reason" value="Video not playing"> Video not playing</label><label><input type="radio" name="reason" value="No audio"> No audio</label><label><input type="radio" name="reason" value="Wrong movie"> Wrong movie</label><label><input type="radio" name="reason" value="Very slow or buffering"> Very slow or buffering</label><label><input type="radio" name="reason" value="Other"> Other</label></div><textarea id="reportMessage" placeholder="Tell us more (optional)"></textarea><button id="submitReportBtn" class="btn-primary">Submit Report</button><button class="close-modal">Cancel</button></div></div>

    <div id="trailerModal" class="modal hidden"><div class="modal-content trailer-modal"><button class="close-modal">✕</button><video id="trailerVideo" controls></video></div></div>

    <div id="toast" class="toast hidden"></div>
    <div id="settingsModal" class="modal hidden"><div class="modal-content glass"><div class="modal-header"><h2>Settings</h2><button class="close-modal">&times;</button></div><div class="modal-body"><div class="settings-section"><h3>Appearance</h3><label><input type="radio" name="theme" value="dark"> Dark Mode</label><label><input type="radio" name="theme" value="light"> Light Mode</label></div><div id="adminSection" style="display:none"><h3>Admin</h3><button id="forceSyncBtn">Force Sync</button></div></div></div></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
