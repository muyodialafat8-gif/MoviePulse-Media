<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>MoviePulse - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dark">
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <img src="assets/logo.png" alt="MoviePulse" class="loading-logo">
            <h1 class="loading-title">MOVIEPULSE</h1>
            <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card glass">
            <div class="auth-logo">
                <img src="assets/logo.png" alt="MoviePulse">
                <h2>MoviePulse</h2>
            </div>
            <h1>Create Account</h1>
            <p class="auth-subtitle">Join MoviePulse today</p>

            <button id="googleRegisterBtn" class="google-btn">
                <span class="google-icon">G</span> Continue with Google
            </button>

            <div class="divider">OR</div>

            <form id="registerForm">
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" id="fullName" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <span class="input-icon">📧</span>
                    <input type="email" id="registerEmail" placeholder="Email address" required>
                </div>
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="registerPassword" placeholder="Password" required>
                    <button type="button" class="toggle-password" data-target="registerPassword">👁️</button>
                </div>
                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                    <span class="strength-text" id="strengthText">Weak</span>
                </div>
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                    <button type="button" class="toggle-password" data-target="confirmPassword">👁️</button>
                </div>
                <button type="submit" id="registerBtn" class="btn-primary full-width">Create Account</button>
            </form>

            <div class="auth-links">
                <a href="login.html">Already have an account? Sign In</a>
            </div>

            <div class="divider"></div>
            <div class="community-section">
                <p>Join our community</p>
                <button id="whatsappCommunityBtn" class="whatsapp-btn">
                    💬 Join WhatsApp Channel
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
