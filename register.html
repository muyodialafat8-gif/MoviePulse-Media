<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/png" href="./assets/logo.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Create Account — MoviePulse</title>
  </head>
  <body class="auth-body">
    <a href="./index.html" class="auth-logo">
      <img src="./assets/logo.png" alt="MoviePulse" />
    </a>

    <main class="auth-wrap">
      <div class="auth-card glass">
        <h1>Create Account</h1>
        <p class="muted">Join MoviePulse today</p>

        <button id="googleBtn" class="btn btn-google">
          <i class="fa-brands fa-google"></i> Continue with Google
        </button>

        <div class="divider"><span>OR</span></div>

        <form id="registerForm" class="auth-form">
          <label class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="regName" placeholder="Full Name" required autocomplete="name" />
          </label>
          <label class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="regEmail" placeholder="Email Address" required autocomplete="email" />
          </label>
          <label class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="regPassword" placeholder="Password" required autocomplete="new-password" />
          </label>
          <div class="strength-meter">
            <div id="strengthBar" class="strength-bar"></div>
          </div>
          <small id="strengthLabel" class="muted">Password strength</small>
          <label class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="regConfirm" placeholder="Confirm Password" required autocomplete="new-password" />
          </label>
          <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>

        <p class="center auth-foot">
          Already have an account? <a href="./login.html" class="accent">Sign In</a>
        </p>
      </div>
    </main>

    <div id="toast" class="toast" hidden></div>

    <script type="module" src="./js/firebase.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
